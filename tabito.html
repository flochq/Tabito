
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tabito — Explorez l'inconnu</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fog: #e8ecf0;
    --accent: #2563eb;
    --accent2: #0ea5e9;
    --card: rgba(255,255,255,0.92);
    --text: #1e293b;
    --muted: #64748b;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--fog); }
  #map { width: 100%; height: 100%; }

  /* Logo */
  #logo { position: absolute; top: 16px; left: 16px; z-index: 1000; pointer-events: none; }
  #logo h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--accent); letter-spacing: 0.04em; line-height: 1; }
  #logo p { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }

  /* GPS dot */
  #gps-dot { position: absolute; top: 24px; right: 16px; z-index: 1000; width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
  #gps-dot.active { background: var(--accent); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%{box-shadow:0 0 0 0 rgba(37,99,235,0.6)} 70%{box-shadow:0 0 0 8px rgba(200,241,53,0)} 100%{box-shadow:0 0 0 0 rgba(200,241,53,0)} }

  /* Follow button */
  #follow-btn { position: absolute; bottom: 32px; right: 16px; z-index: 1000; display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(37,99,235,0.25); background: var(--card); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.2s; }
  #follow-btn.on { border-color: var(--accent); color: var(--accent); }

  /* Stats */
  #stats { position: absolute; bottom: 20px; left: 16px; z-index: 1000; display: flex; gap: 8px; flex-wrap: wrap; max-width: calc(100vw - 32px); }
  .stat-chip { display: flex; flex-direction: column; align-items: center; padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.08); background: var(--card); backdrop-filter: blur(8px); }
  .stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); line-height: 1; }
  .stat-lbl { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

  /* Loading */
  #loading { position: absolute; inset: 0; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--fog); gap: 20px; }
  #loading h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: var(--accent); }
  #loading p { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(37,99,235,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Permission banner */
  #perm-banner { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; padding: 12px 20px; border-radius: 10px; background: var(--card); border: 1px solid rgba(255,100,100,0.3); font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #f87171; backdrop-filter: blur(8px); white-space: nowrap; }

  /* User marker */
  .user-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--accent2); border: 2px solid #fff; animation: pulse-user 2s infinite; }
  @keyframes pulse-user { 0%{box-shadow:0 0 0 0 rgba(56,232,200,0.5)} 70%{box-shadow:0 0 0 12px rgba(56,232,200,0)} 100%{box-shadow:0 0 0 0 rgba(56,232,200,0)} }

  /* POI markers */
  .poi-dot { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.92); border: 1.5px solid rgba(37,99,235,0.3); display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; animation: float 3s ease-in-out infinite; transition: border-color 0.3s, background 0.3s; }
  .poi-dot.discovered { border-color: var(--accent); background: rgba(37,99,235,0.1); box-shadow: 0 0 12px rgba(37,99,235,0.25); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* Popup */
  .leaflet-popup-content-wrapper { background: var(--card) !important; border: 1px solid rgba(37,99,235,0.25) !important; border-radius: 12px !important; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; color: var(--text) !important; }
  .leaflet-popup-tip { background: rgba(255,255,255,0.95) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; }
  .poi-popup { padding: 4px; min-width: 180px; }
  .poi-popup-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .poi-popup-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 6px; }
  .poi-popup-desc { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
  .poi-popup-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.4); font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); }

  /* Toast */
  #toast { position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px); z-index: 1000; opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-inner { display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 30px; background: var(--card); border: 1px solid rgba(37,99,235,0.4); backdrop-filter: blur(10px); white-space: nowrap; }
  .t-icon { font-size: 1.1rem; }
  .t-text { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--accent); letter-spacing: 0.08em; }

  /* Camera button */
  #camera-btn {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    z-index: 1000; text-align: center;
  }
  #camera-trigger {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 30px;
    background: #2563eb; color: #fff;
    font-family: "Space Mono", monospace; font-size: 0.8rem;
    letter-spacing: 0.08em; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    animation: pulse-cam 2s infinite;
  }
  @keyframes pulse-cam {
    0%,100% { box-shadow: 0 4px 20px rgba(37,99,235,0.4); }
    50%      { box-shadow: 0 4px 28px rgba(37,99,235,0.7); }
  }
  #camera-poi-name {
    font-family: "Space Mono", monospace; font-size: 0.65rem;
    color: #64748b; margin-top: 6px; letter-spacing: 0.08em;
  }

  /* Route planner */
  #camera-counter-btn {
    position: absolute; top: 16px; right: 100px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.92); border: 1.5px solid rgba(37,99,235,0.2);
    font-size: 1.3rem; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  #camera-counter-btn:hover { transform: scale(1.1); }

  #route-btn {
    position: absolute; top: 16px; right: 44px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: none; border: none;
    cursor: pointer; padding: 0;
    transition: transform 0.2s;
    box-shadow: none;
  }
  #route-btn:hover { transform: scale(1.1); }

  #route-panel {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: none;
    background: rgba(255,255,255,0.97); border-radius: 16px;
    border: 1px solid rgba(37,99,235,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    width: min(360px, 90vw); overflow: hidden;
    backdrop-filter: blur(12px);
  }
  #route-panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-bottom: 1px solid rgba(0,0,0,0.07);
    font-family: "Syne", sans-serif; font-weight: 700;
    font-size: 0.9rem; color: #1e293b;
  }
  #route-close {
    background: none; border: none; cursor: pointer;
    color: #64748b; font-size: 1rem;
  }
  #route-options, #route-result { padding: 16px; }
  .route-opt-group { margin-bottom: 14px; }
  .route-opt-group label {
    font-family: "Space Mono", monospace; font-size: 0.65rem;
    color: #64748b; text-transform: uppercase; letter-spacing: 0.1em;
    display: block; margin-bottom: 8px;
  }
  .route-btns { display: flex; gap: 8px; }
  .route-type-btn {
    flex: 1; padding: 8px 4px; border-radius: 8px;
    border: 1px solid rgba(37,99,235,0.2);
    background: #f8fafc; color: #64748b;
    font-family: "Space Mono", monospace; font-size: 0.65rem;
    cursor: pointer; transition: all 0.2s;
  }
  .route-type-btn.active {
    background: #2563eb; color: #fff; border-color: #2563eb;
  }
  .route-input-group {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .route-input-group input[type=range] {
    flex: 1; accent-color: #2563eb;
  }
  .route-input-group span {
    font-family: "Syne", sans-serif; font-weight: 700;
    font-size: 0.9rem; color: #1e293b; min-width: 70px; text-align: right;
  }
  #route-generate {
    width: 100%; padding: 12px; border-radius: 10px;
    background: #2563eb; color: #fff; border: none;
    font-family: "Space Mono", monospace; font-size: 0.75rem;
    letter-spacing: 0.06em; cursor: pointer;
    box-shadow: 0 2px 12px rgba(37,99,235,0.3);
  }
  #route-summary {
    font-family: "Space Mono", monospace; font-size: 0.7rem;
    color: #64748b; margin-bottom: 12px; line-height: 1.6;
  }
  #route-steps-list { margin-bottom: 14px; }
  .route-step {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .route-step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: #2563eb; color: #fff;
    font-family: "Syne", sans-serif; font-weight: 700; font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .route-step-name {
    font-family: "Space Mono", monospace; font-size: 0.68rem; color: #1e293b;
  }
  .route-step-dist { font-family: "Space Mono", monospace; font-size: 0.6rem; color: #94a3b8; margin-left: auto; }
  #route-start, #route-reset {
    width: 100%; padding: 10px; border-radius: 10px; border: none;
    font-family: "Space Mono", monospace; font-size: 0.72rem;
    letter-spacing: 0.06em; cursor: pointer; margin-bottom: 8px;
  }
  #route-start { background: #2563eb; color: #fff; }
  #route-reset { background: #f1f5f9; color: #64748b; }

  /* Album panel */
  #album-panel {
    position: absolute; inset: 0; z-index: 1100;
    background: rgba(248,250,252,0.98); display: none;
    flex-direction: column; overflow: hidden;
    backdrop-filter: blur(12px);
  }
  #album-panel.open { display: flex; }
  #album-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  #album-header h2 {
    font-family: "Syne", sans-serif; font-weight: 800;
    font-size: 1.1rem; color: #1e293b;
  }
  #album-close {
    background: none; border: none; font-size: 1.2rem;
    cursor: pointer; color: #64748b;
  }
  #album-tabs {
    display: flex; gap: 8px; padding: 12px 16px;
    overflow-x: auto; border-bottom: 1px solid rgba(0,0,0,0.07);
    scrollbar-width: none;
  }
  #album-tabs::-webkit-scrollbar { display: none; }
  .album-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid rgba(37,99,235,0.2);
    background: #f1f5f9; color: #64748b;
    font-family: "Space Mono", monospace; font-size: 0.65rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .album-tab.active {
    background: #2563eb; color: #fff; border-color: #2563eb;
  }
  #album-add-btn {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    background: #2563eb; color: #fff; border: none;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  #album-content {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .album-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; gap: 12px;
    color: #94a3b8; font-family: "Space Mono", monospace; font-size: 0.7rem;
    text-align: center;
  }
  .album-empty span { font-size: 2.5rem; }
  .album-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .album-photo-card {
    border-radius: 12px; overflow: hidden;
    border: 1.5px solid rgba(37,99,235,0.15);
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .album-photo-card img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
  }
  .album-photo-name {
    padding: 6px 8px;
    font-family: "Space Mono", monospace; font-size: 0.6rem;
    color: #64748b; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* New collection modal */
  #new-collection-modal {
    position: absolute; inset: 0; z-index: 1200;
    background: rgba(0,0,0,0.4); display: none;
    align-items: center; justify-content: center;
  }
  #new-collection-modal.open { display: flex; }
  #new-collection-box {
    background: #fff; border-radius: 16px; padding: 20px;
    width: min(320px, 85vw); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  #new-collection-box h3 {
    font-family: "Syne", sans-serif; font-weight: 700;
    font-size: 1rem; color: #1e293b; margin-bottom: 14px;
  }
  #new-collection-input {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1.5px solid rgba(37,99,235,0.25);
    font-family: "Space Mono", monospace; font-size: 0.75rem;
    color: #1e293b; outline: none; margin-bottom: 14px;
  }
  #new-collection-input:focus { border-color: #2563eb; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-family: "Space Mono", monospace; font-size: 0.7rem; cursor: pointer;
  }
  #modal-confirm { background: #2563eb; color: #fff; }
  #modal-cancel { background: #f1f5f9; color: #64748b; }

  .leaflet-control-attribution { display: none; }
  .leaflet-control-zoom { display: none; }
</style>
</head>
<body>

<div id="map"></div>
<div id="logo"><h1>Tabito</h1><p>explorez l'inconnu</p></div>
<div id="gps-dot"></div>
<div id="stats">
  <div class="stat-chip"><span class="stat-val" id="stat-photos">0</span><span class="stat-lbl">photos</span></div>
  <div class="stat-chip"><span class="stat-val" id="stat-pois">0</span><span class="stat-lbl">découvertes</span></div>
  <div class="stat-chip" id="stat-city-chip" style="display:none">
    <span class="stat-val" id="stat-coverage">0%</span>
    <span class="stat-lbl" id="city-name">ville</span>
  </div>
</div>

<div id="loading"><h2>Tabito</h2><div class="spinner"></div><p>Chargement…</p></div>
<div id="perm-banner">📍 Autorisez la localisation pour explorer</div>
<div id="toast"><div class="toast-inner"><span class="t-icon"></span><span class="t-text"></span></div></div>

<!-- Route planner -->
<div id="route-panel">
  <div id="route-panel-header">
    <span>🧭 Planifier une balade</span>
    <button id="route-close">✕</button>
  </div>
  <div id="route-options">
    <div class="route-opt-group">
      <label>Je veux marcher…</label>
      <div class="route-btns">
        <button class="route-type-btn active" data-type="duration">⏱ Durée</button>
        <button class="route-type-btn" data-type="distance">📏 Distance</button>
        <button class="route-type-btn" data-type="steps">👟 Pas</button>
      </div>
    </div>
    <div id="route-duration-group" class="route-input-group">
      <input type="range" id="route-duration" min="15" max="120" step="15" value="45" />
      <span id="route-duration-label">45 min</span>
    </div>
    <div id="route-distance-group" class="route-input-group" style="display:none">
      <input type="range" id="route-distance" min="1" max="15" step="0.5" value="4" />
      <span id="route-distance-label">4 km</span>
    </div>
    <div id="route-steps-group" class="route-input-group" style="display:none">
      <input type="range" id="route-steps" min="2000" max="15000" step="1000" value="8000" />
      <span id="route-steps-label">8 000 pas</span>
    </div>
    <button id="route-generate">Générer l'itinéraire 🗺️</button>
  </div>
  <div id="route-result" style="display:none">
    <div id="route-summary"></div>
    <div id="route-steps-list"></div>
    <button id="route-start">C'est parti ! 🚀</button>
    <button id="route-reset">↩ Recommencer</button>
  </div>
</div>

<!-- Camera counter button -->
<button id="camera-counter-btn">📸</button>

<script>
const STORAGE_KEY  = "tabito-v2";
const CIRCLE_STEPS = 48;
const FOG_COLOR    = "#cbd5e1";
const FOG_BANDS    = [
  { radius:0.03, opacity:0    },
  { radius:0.04, opacity:0.15 },
  { radius:0.055, opacity:0.35 },
  { radius:0.07, opacity:0.55 },
];
const MAIN_OPACITY = 0.82;
const POI_DIST_KM  = 0.05;
const WORLD = { type:"Feature", properties:{}, geometry:{ type:"Polygon", coordinates:[[[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]]] }};

// POI helpers
function poiIcon(tags) {
  if (tags.tourism === "museum")          return "🏛️";
  if (tags.tourism === "monument" || tags.historic === "monument") return "🗿";
  if (tags.historic === "castle")         return "🏰";
  if (tags.historic === "ruins")          return "🏚️";
  if (tags.amenity === "place_of_worship" || tags.building === "church" || tags.building === "cathedral") return "⛪";
  if (tags.tourism === "artwork")         return "🎨";
  if (tags.leisure === "park" || tags.leisure === "garden") return "🌳";
  if (tags.amenity === "fountain")        return "⛲";
  if (tags.historic === "memorial")       return "🕯️";
  if (tags.tourism === "viewpoint")       return "🔭";
  if (tags.amenity === "theatre")         return "🎭";
  if (tags.tourism === "attraction")      return "✨";
  return "📍";
}
function poiDesc(tags) {
  if (tags.tourism === "museum")          return "Musée — entrez pour découvrir ses collections.";
  if (tags.historic === "castle")         return "Un château chargé d'histoire.";
  if (tags.historic === "monument" || tags.tourism === "monument") return "Monument historique.";
  if (tags.historic === "ruins")          return "Ruines témoignant d'un passé lointain.";
  if (tags.building === "church" || tags.building === "cathedral") return "Édifice religieux remarquable.";
  if (tags.amenity === "place_of_worship") return "Lieu de culte.";
  if (tags.tourism === "artwork")         return "Oeuvre d'art à découvrir.";
  if (tags.leisure === "park")            return "Un espace vert pour se ressourcer.";
  if (tags.leisure === "garden")          return "Jardin à explorer.";
  if (tags.amenity === "fountain")        return "Une fontaine emblématique.";
  if (tags.historic === "memorial")       return "Mémorial commémoratif.";
  if (tags.tourism === "viewpoint")       return "Point de vue remarquable.";
  if (tags.amenity === "theatre")         return "Salle de spectacle.";
  return "Point d'intérêt à découvrir.";
}
async function fetchOSMPOIs(lng, lat, radiusM = 800) {
  const query = `[out:json][timeout:10];(node["tourism"~"museum|monument|artwork|viewpoint|attraction"](around:${radiusM},${lat},${lng});node["historic"~"monument|castle|ruins|memorial"](around:${radiusM},${lat},${lng});node["amenity"~"place_of_worship|fountain|theatre"](around:${radiusM},${lat},${lng});node["leisure"~"park|garden"](around:${radiusM},${lat},${lng});way["leisure"~"park|garden"](around:${radiusM},${lat},${lng});way["historic"~"castle|ruins"](around:${radiusM},${lat},${lng});way["tourism"~"museum|monument"](around:${radiusM},${lat},${lng}););out center 40;`;
  try {
    const servers = ["https://maps.mail.ru/osm/tools/overpass/api/interpreter","https://overpass-api.de/api/interpreter"];
    let res;
    for (const s of servers) {
      try { res = await fetch(s, { method:"POST", body:query }); if(res.ok) break; } catch {}
    }
    if (!res || !res.ok) throw new Error("All servers failed");
    const data = await res.json();
    return data.elements
      .filter(el => el.tags && (el.tags.name || el.tags["name:fr"]))
      .filter(el => {
        // Pour les parcs et jardins, exiger wikipedia, wikidata ou heritage
        const isGreen = el.tags.leisure === "park" || el.tags.leisure === "garden";
        if (!isGreen) return true;
        return el.tags.wikipedia || el.tags.wikidata || el.tags.heritage;
      })
      .map(el => ({
        id: `osm-${el.type}-${el.id}`,
        name: el.tags["name:fr"] || el.tags.name,
        desc: poiDesc(el.tags),
        icon: poiIcon(el.tags),
        lat: el.lat || el.center?.lat,
        lng: el.lon || el.center?.lon,
      }))
      .filter(p => p.lat && p.lng);
  } catch(e) { console.warn("Overpass unavailable", e); return []; }
}

// State
let exploredBands = FOG_BANDS.map((_,i) => {
  try { const d = localStorage.getItem(`${STORAGE_KEY}-band-${i}`); return d ? JSON.parse(d) : null; } catch { return null; }
});
let discovered = new Set();
let totalDist  = parseFloat(localStorage.getItem(`${STORAGE_KEY}-dist`) || "0");
let lastPos    = null;
let followMode = true;
let allPOIs    = [];
let localAdded = false;
try { const s = localStorage.getItem(`${STORAGE_KEY}-disc`); if(s) JSON.parse(s).forEach(id => discovered.add(id)); } catch {}

// Map init
const map = L.map("map", { zoomControl:false, attributionControl:false }).setView([48.8566, 2.3522], 15);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom:19, subdomains:"abcd" }).addTo(map);
document.getElementById("loading").style.display = "none";

// Fog helpers
function computeFog(explored) {
  if (!explored) return WORLD;
  try { const d = turf.difference(WORLD, explored); return d || WORLD; } catch { return WORLD; }
}
function mergeExplored(cur, circle) {
  if (!cur) return circle;
  try { const u = turf.union(cur, circle); return u || cur; } catch { return cur; }
}

// Fog layers
const fogLayers = [];
function initFogLayers() {
  FOG_BANDS.forEach((band, i) => {
    if (band.opacity === 0) { fogLayers.push(null); return; }
    const layer = L.geoJSON(computeFog(exploredBands[i]), {
      style: { fillColor:FOG_COLOR, fillOpacity:band.opacity, stroke:false, weight:0 }
    }).addTo(map);
    fogLayers.push(layer);
  });
  const main = L.geoJSON(computeFog(exploredBands[FOG_BANDS.length-1]), {
    style: { fillColor:FOG_COLOR, fillOpacity:MAIN_OPACITY, stroke:false, weight:0 }
  }).addTo(map);
  fogLayers.push(main);
}

function updateFogLayers() {
  FOG_BANDS.forEach((_, i) => {
    if (!fogLayers[i]) return;
    fogLayers[i].clearLayers();
    fogLayers[i].addData(computeFog(exploredBands[i]));
  });
  const main = fogLayers[FOG_BANDS.length];
  if (main) { main.clearLayers(); main.addData(computeFog(exploredBands[FOG_BANDS.length-1])); }
}

function revealAt(lng, lat) {
  FOG_BANDS.forEach((band, i) => {
    const c = turf.circle([lng,lat], band.radius, { steps:CIRCLE_STEPS, units:"kilometers" });
    exploredBands[i] = mergeExplored(exploredBands[i], c);
    try { localStorage.setItem(`${STORAGE_KEY}-band-${i}`, JSON.stringify(exploredBands[i])); } catch {}
  });
  updateFogLayers();
}

// User marker
let userMarker = null;
function updateMarker(lat, lng) {
  if (!userMarker) {
    userMarker = L.marker([lat,lng], {
      icon: L.divIcon({ className:"", html:'<div class="user-dot"></div>', iconSize:[16,16], iconAnchor:[8,8] })
    }).addTo(map);
  } else {
    userMarker.setLatLng([lat,lng]);
  }

const DYNAMIC_POI_RADIUS = 1500;   // fetch POIs within 1.5km
const DYNAMIC_POI_TRIGGER = 0.4;   // reload when moved 400m from last fetch
let lastFetchPos = null;

async function setupPOIs(lng, lat) {
  if (lng === undefined) return;
  // Check if we need to fetch (first time or moved enough)
  if (lastFetchPos) {
    const moved = turf.distance([lastFetchPos.lng, lastFetchPos.lat], [lng, lat], {units:"kilometers"});
    if (moved < DYNAMIC_POI_TRIGGER) return;
  }
  lastFetchPos = { lng, lat };
  const osmPOIs = await fetchOSMPOIs(lng, lat, DYNAMIC_POI_RADIUS);
  // Only add POIs not already displayed
  let newCount = 0;
  osmPOIs.forEach(poi => {
    if (!poiMarkers.has(poi.id)) {
      allPOIs.push(poi);
      addPOIMarker(poi);

// City boundary
async function fetchCityBoundary(lng, lat) {
  const query = `[out:json][timeout:15];is_in(${lat},${lng})->.a;area.a["admin_level"="8"]["boundary"="administrative"]->.b;rel(pivot.b);out geom;`;
  try {
    const servers = ["https://maps.mail.ru/osm/tools/overpass/api/interpreter","https://overpass-api.de/api/interpreter"];
    let res;
    for (const s of servers) {
      try { res = await fetch(s, { method:"POST", body:query }); if(res.ok) break; } catch {}
    }
    if (!res || !res.ok) throw new Error("All servers failed");
    const data = await res.json();
    if (!data.elements || !data.elements.length) return null;
    const rel = data.elements[0];

    // Reconstruct outer polygon from relation members
    const outerWays = rel.members.filter(m => m.type === "way" && m.role === "outer" && m.geometry);
    if (!outerWays.length) return null;

    // Chain segments in correct order
    let segments = outerWays.map(w => w.geometry.map(p => [p.lon, p.lat]));
    const ptEq = (a, b) => Math.abs(a[0]-b[0]) < 1e-6 && Math.abs(a[1]-b[1]) < 1e-6;
    const ptDist = (a, b) => Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);

    // Build all rings by greedy nearest-neighbor chaining
    let rings = [];
    while (segments.length > 0) {
      let ring = [...segments[0]];
      segments.splice(0, 1);
      let maxIter = segments.length * 3;
      while (segments.length > 0 && maxIter-- > 0) {
        const tail = ring[ring.length - 1];
        let bestIdx = -1, bestDist = 1e9, bestReverse = false;
        for (let i = 0; i < segments.length; i++) {
          const seg = segments[i];
          const d1 = ptDist(tail, seg[0]);
          const d2 = ptDist(tail, seg[seg.length-1]);
          if (d1 < bestDist) { bestDist = d1; bestIdx = i; bestReverse = false; }
          if (d2 < bestDist) { bestDist = d2; bestIdx = i; bestReverse = true; }
        }
        if (bestIdx === -1 || bestDist > 0.001) break;
        const seg = segments[bestIdx];
        segments.splice(bestIdx, 1);
        ring = ring.concat(bestReverse ? [...seg].reverse().slice(1) : seg.slice(1));
      }
      if (!ptEq(ring[0], ring[ring.length-1])) ring.push(ring[0]);
      rings.push(ring);
    }

    // Use the longest ring as the outer boundary
    rings.sort((a, b) => b.length - a.length);
    let coords = rings[0];
    if (coords.length < 4) return null;

    const polygon = turf.polygon([coords]);
    cityArea = turf.area(polygon) / 1e6;
    cityBoundary = polygon;

    L.geoJSON(polygon, {
      style: { color:"#2563eb", weight:2.5, fillOpacity:0, dashArray:"8,5", opacity:1 }
    }).addTo(map);

    const cityName = rel.tags?.["name:fr"] || rel.tags?.name || "Votre ville";
    document.getElementById("city-name").textContent = cityName;
    updateStats();
    return polygon;
  } catch(e) { console.warn("City boundary unavailable", e); return null; }
}

function computeCoveragePercent() {
  if (!cityBoundary || !exploredBands[0]) return 0;
  try {
    const intersection = turf.intersect(exploredBands[0], cityBoundary);
    if (!intersection) return 0;
    const exploredArea = turf.area(intersection) / 1e6;
    return Math.min(100, (exploredArea / cityArea) * 100);
  } catch { return 0; }
}

// Assassin's Creed style reveal around a POI
const POI_REVEAL_RADIUS_KM = 0.35; // 350m reveal radius
const POI_REVEAL_STEPS = 12; // animation steps

function revealAreaAroundPOI(poi) {
  let step = 0;
  const interval = setInterval(() => {
    step++;
    const radius = (POI_REVEAL_RADIUS_KM / POI_REVEAL_STEPS) * step;
    // Reveal all fog bands proportionally
    FOG_BANDS.forEach((band, i) => {
      const r = Math.max(band.radius, radius * (1 + i * 0.15));
      const circle = turf.circle([poi.lng, poi.lat], r, { steps: CIRCLE_STEPS, units: "kilometers" });
      exploredBands[i] = mergeExplored(exploredBands[i], circle);
      try { localStorage.setItem(`${STORAGE_KEY}-band-${i}`, JSON.stringify(exploredBands[i])); } catch {}
    });
    updateFogLayers();
    if (step >= POI_REVEAL_STEPS) clearInterval(interval);
  }, 80);
}

// Convert any constraint to km
function getTargetKm() {
  const activeType = document.querySelector(".route-type-btn.active").dataset.type;
  if (activeType === "duration") return (parseInt(document.getElementById("route-duration").value) / 60) * AVG_SPEED_KMH;
  if (activeType === "distance") return parseFloat(document.getElementById("route-distance").value);
  if (activeType === "steps")    return parseInt(document.getElementById("route-steps").value) / STEPS_PER_KM;
}

// Fetch walking route from OSRM
async function fetchRoute(coords) {
  const coordStr = coords.map(c => `${c[0]},${c[1]}`).join(";");
  try {
    const res = await fetch(`https://router.project-osrm.org/route/v1/foot/${coordStr}?overview=full&geometries=geojson&steps=false`);
    const data = await res.json();
    if (data.code !== "Ok") return null;
    return data.routes[0];
  } catch { return null; }
}

// Select best POIs for route
function selectRoutePOIs(lng, lat, targetKm) {
  // Get undiscovered POIs sorted by distance
  const candidates = allPOIs
    .filter(poi => !discovered.has(poi.id))
    .map(poi => ({ ...poi, dist: turf.distance([lng,lat],[poi.lng,poi.lat],{units:"kilometers"}) }))
    .filter(poi => poi.dist <= targetKm * 0.6) // must be reachable
    .sort((a,b) => a.dist - b.dist);

  // Greedily pick POIs that fit in the budget
  const selected = [];
  let remaining = targetKm * 0.5; // leave half for return
  let lastLng = lng, lastLat = lat;

  for (const poi of candidates) {
    const d = turf.distance([lastLng,lastLat],[poi.lng,poi.lat],{units:"kilometers"});
    if (d <= remaining) {
      selected.push(poi);
      remaining -= d;
      lastLng = poi.lng; lastLat = poi.lat;
      if (selected.length >= 5) break; // max 5 POIs
    }
  }
  return selected;
}

document.getElementById("route-generate").addEventListener("click", async () => {
  if (!lastPos) { showToast("📍", "Position GPS requise"); return; }
  const btn = document.getElementById("route-generate");
  btn.textContent = "Calcul en cours…";
  btn.disabled = true;

  const targetKm = getTargetKm();
  const pois = selectRoutePOIs(lastPos.lng, lastPos.lat, targetKm);

  if (pois.length === 0) {
    showToast("😕", "Aucun monument à portée, essayez un rayon plus grand");
    btn.textContent = "Générer l'itinéraire 🗺️"; btn.disabled = false;
    return;
  }

  // Build waypoints: start → POIs → start
  const waypoints = [
    [lastPos.lng, lastPos.lat],
    ...pois.map(p => [p.lng, p.lat]),
    [lastPos.lng, lastPos.lat]
  ];

  const route = await fetchRoute(waypoints);
  btn.textContent = "Générer l'itinéraire 🗺️"; btn.disabled = false;

  if (!route) { showToast("❌", "Impossible de calculer l'itinéraire"); return; }

  const distKm = (route.distance / 1000).toFixed(1);
  const durMin = Math.round(route.duration / 60);

  // Show result
  document.getElementById("route-options").style.display = "none";
  document.getElementById("route-result").style.display = "block";
  document.getElementById("route-summary").innerHTML =
    `📏 <b>${distKm} km</b> &nbsp;·&nbsp; ⏱ <b>${durMin} min</b> &nbsp;·&nbsp; 🏛️ <b>${pois.length} monuments</b>`;

  const stepsList = document.getElementById("route-steps-list");
  stepsList.innerHTML = "";
  pois.forEach((poi, i) => {
    stepsList.innerHTML += `<div class="route-step">
      <div class="route-step-num">${i+1}</div>
      <div class="route-step-name">${poi.icon} ${poi.name}</div>
      <div class="route-step-dist">${poi.dist.toFixed(1)}km</div>
    </div>`;
  });

  // Draw route on map
  if (activeRouteLayer) map.removeLayer(activeRouteLayer);
  activeRouteLayer = L.geoJSON(route.geometry, {
    style: { color:"#2563eb", weight:4, opacity:0.7, dashArray:"8,4" }
  }).addTo(map);

  // Numbered markers on POIs
  activeRouteMarkers.forEach(m => map.removeLayer(m));
  activeRouteMarkers = pois.map((poi, i) => {
    return L.marker([poi.lat, poi.lng], {
      icon: L.divIcon({
        className:"",
        html:`<div style="width:26px;height:26px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:700;font-size:0.75rem;border:2px solid #fff;box-shadow:0 2px 8px rgba(37,99,235,0.4)">${i+1}</div>`,
        iconSize:[26,26], iconAnchor:[13,13]
      })
    }).addTo(map);
  });

  // Fit map to route
  map.fitBounds(activeRouteLayer.getBounds(), { padding:[40,40] });
});

function renderAlbumContent() {

    content.innerHTML = `<div class="album-empty"><span>📷</span><p>Aucune photo dans cette collection.<br>Approche-toi d'un monument pour en prendre une !</p></div>`;

  cameraInput.click();
});
document.getElementById("stat-photos").parentElement.style.cursor = "pointer";
document.getElementById("stat-photos").parentElement.addEventListener("click", openAlbum);
document.getElementById("album-close").addEventListener("click", closeAlbum);

// New collection modal
document.getElementById("modal-confirm").addEventListener("click", () => {
  const name = document.getElementById("new-collection-input").value.trim();
  if (!name) return;
  const cols = loadCollections();
  if (!cols.includes(name)) { cols.push(name); saveCollections(cols); }
  document.getElementById("new-collection-modal").classList.remove("open");
  activeCollection = name;
  renderAlbumTabs();
  renderAlbumContent();
  showToast("✅", `Collection "${name}" créée !`);
});
document.getElementById("modal-cancel").addEventListener("click", () => {
  document.getElementById("new-collection-modal").classList.remove("open");
});
document.getElementById("new-collection-input").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("modal-confirm").click();
});

// Geolocation
if (!("geolocation" in navigator)) {
  document.getElementById("perm-banner").style.display = "block";
  setupPOIs(); initFogLayers();
} else {
  navigator.geolocation.getCurrentPosition(async pos => {
    const { longitude:lng, latitude:lat } = pos.coords;
    document.getElementById("gps-dot").classList.add("active");
    revealAt(lng, lat);
    initFogLayers();
    map.setView([lat,lng], 16);
    updateMarker(lat, lng);
    await setupPOIs(lng, lat);
    fetchCityBoundary(lng, lat);
    checkPOIs(lng, lat);
    lastPos = { lng, lat };
    updateStats();
  }, () => {
    document.getElementById("perm-banner").style.display = "block";
    initFogLayers();
  }, { enableHighAccuracy:true, timeout:10000 });

  navigator.geolocation.watchPosition(pos => {
    const { longitude:lng, latitude:lat } = pos.coords;
    document.getElementById("gps-dot").classList.add("active");
    if (lastPos) {
      const d = turf.distance([lastPos.lng,lastPos.lat],[lng,lat],{units:"kilometers"});
      if (d > 0.005) {
        totalDist += d;
        try { localStorage.setItem(`${STORAGE_KEY}-dist`, totalDist.toString()); } catch {}
      }
    }
    lastPos = { lng, lat };
    revealAt(lng, lat);
    updateMarker(lat, lng);
    setupPOIs(lng, lat);
    checkPOIs(lng, lat);
    updateStats();
  }, () => {}, { enableHighAccuracy:true, maximumAge:2000, timeout:10000 });
}
</script>
</body>
</html>
